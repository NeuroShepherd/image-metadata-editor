<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Metadata Editor</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <style>
      /* ── Reset & base ─────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, "Helvetica Neue", sans-serif;
        background: #f4f5f7;
        color: #1a1a2e;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ──────────────────────────────────────────────────── */
      header {
        background: #1a1a2e;
        color: #fff;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      header h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .file-selector {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .file-selector label {
        cursor: pointer;
        background: #e94560;
        color: #fff;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        transition: background 0.2s;
      }
      .file-selector label:hover {
        background: #d63851;
      }
      .file-selector input[type="file"] {
        display: none;
      }
      .file-selector .path-input {
        flex: 1;
        min-width: 200px;
        padding: 8px 12px;
        border: 1px solid #444;
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
        background: #16213e;
        color: #fff;
        outline: none;
        transition: border-color 0.2s;
      }
      .file-selector .path-input:focus {
        border-color: #e94560;
      }
      .file-selector .path-input::placeholder {
        color: #666;
      }
      .file-selector .action-btn {
        background: #0f3460;
        color: #fff;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      .file-selector .action-btn:hover {
        background: #16213e;
      }
      .file-selector .clear-btn {
        background: #555;
        color: #fff;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      .file-selector .clear-btn:hover {
        background: #e94560;
      }
      .file-selector .clear-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .metadata-panel .file-path {
        font-size: 12px;
        color: #888;
        margin-bottom: 16px;
        padding: 6px 10px;
        background: #f5f5f5;
        border-radius: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .file-selector .load-btn {
        background: #0f3460;
        color: #fff;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      .file-selector .load-btn:hover {
        background: #16213e;
      }

      /* ── Main layout ──────────────────────────────────────────────── */
      .main-grid {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr;
        gap: 0;
        overflow: hidden;
      }

      /* ── Left panel: Metadata form ────────────────────────────────── */
      .metadata-panel {
        background: #fff;
        padding: 24px;
        overflow-y: auto;
        border-right: 1px solid #e0e0e0;
      }
      .metadata-panel h2 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 20px;
        color: #1a1a2e;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #555;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d0d0d0;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
        color: #1a1a2e;
        background: #fafafa;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .form-group input:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: #0f3460;
        background: #fff;
      }
      .form-group textarea {
        resize: vertical;
        min-height: 60px;
      }
      .form-group input:disabled,
      .form-group textarea:disabled {
        background: #f0f0f0;
        color: #999;
        cursor: not-allowed;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .form-section {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #e8e8e8;
      }
      .form-section h3 {
        font-size: 14px;
        font-weight: 600;
        color: #0f3460;
        margin-bottom: 12px;
      }
      .keywords-container {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }
      .keyword-tag {
        background: #e8edf5;
        color: #0f3460;
        padding: 4px 10px;
        border-radius: 14px;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .keyword-tag .remove-keyword {
        cursor: pointer;
        font-weight: bold;
        color: #e94560;
        font-size: 14px;
        line-height: 1;
      }
      .keyword-tag .remove-keyword:hover {
        color: #c7304a;
      }
      .add-keyword-row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .add-keyword-row input {
        flex: 1;
      }
      .add-keyword-row button {
        background: #0f3460;
        color: #fff;
        border: none;
        padding: 8px 14px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
      }
      .add-keyword-row button:hover {
        background: #16213e;
      }

      .save-bar {
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #e8e8e8;
        display: flex;
        justify-content: flex-end;
        gap: 12px;
      }
      .save-bar button {
        padding: 10px 24px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: background 0.2s;
      }
      .save-bar .btn-save {
        background: #e94560;
        color: #fff;
      }
      .save-bar .btn-save:hover {
        background: #d63851;
      }
      .save-bar .btn-reset {
        background: #f0f0f0;
        color: #555;
      }
      .save-bar .btn-reset:hover {
        background: #e0e0e0;
      }
      .save-bar .btn-save:disabled,
      .save-bar .btn-reset:disabled,
      .save-bar .btn-clear:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ── Right panel: Image preview + Map ─────────────────────────── */
      .right-panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .image-preview {
        flex: 0 0 auto;
        height: 45%;
        background: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      .image-preview img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .image-preview .placeholder {
        color: #666;
        font-size: 14px;
        text-align: center;
        padding: 20px;
      }
      .image-preview .placeholder strong {
        display: block;
        font-size: 16px;
        color: #888;
        margin-bottom: 4px;
      }
      .image-preview .nav-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        pointer-events: none;
        padding: 0 8px;
      }
      .image-preview .nav-overlay button {
        pointer-events: auto;
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
        opacity: 0;
      }
      .image-preview:hover .nav-overlay button {
        opacity: 1;
      }
      .image-preview .nav-overlay button:hover {
        background: rgba(0, 0, 0, 0.7);
      }
      .image-preview .nav-overlay button:disabled {
        opacity: 0 !important;
        cursor: default;
      }
      .image-counter {
        position: absolute;
        bottom: 8px;
        right: 12px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 12px;
        padding: 3px 10px;
        border-radius: 10px;
        pointer-events: none;
      }

      #map {
        flex: 1;
        min-height: 0;
      }

      /* ── Status toast ─────────────────────────────────────────────── */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 12px 20px;
        border-radius: 8px;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 0.3s,
          transform 0.3s;
        pointer-events: none;
        z-index: 9999;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      .toast.success {
        background: #2d6a4f;
      }
      .toast.error {
        background: #e94560;
      }
      .toast.info {
        background: #0f3460;
      }

      /* ── Responsive ───────────────────────────────────────────────── */
      @media (max-width: 900px) {
        .main-grid {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }
        .metadata-panel {
          border-right: none;
          border-bottom: 1px solid #e0e0e0;
          max-height: 50vh;
        }
        .image-preview {
          height: 200px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ─── Header ─────────────────────────────────────────────────────── -->
    <header>
      <h1>📷 Image Metadata Editor</h1>
      <div class="file-selector">
        <label for="fileInput">
          Browse Files…
          <input type="file" id="fileInput" accept="image/*" multiple />
        </label>
        <label for="folderInput">
          📁 Folder…
          <input
            type="file"
            id="folderInput"
            accept="image/*"
            webkitdirectory
          />
        </label>
        <button class="clear-btn" id="clearBtn" disabled>Clear All</button>
      </div>
    </header>

    <!-- ─── Main Grid ──────────────────────────────────────────────────── -->
    <div class="main-grid">
      <!-- Left: Metadata Form -->
      <div class="metadata-panel" id="metadataPanel">
        <h2>Metadata</h2>
        <div class="file-path" id="filePath">No file loaded</div>

        <div class="form-group">
          <label for="inputTitle">Title</label>
          <input
            type="text"
            id="inputTitle"
            placeholder="Image title…"
            disabled
          />
        </div>

        <div class="form-group">
          <label for="inputDescription">Description</label>
          <textarea
            id="inputDescription"
            placeholder="Description / caption…"
            disabled
          ></textarea>
        </div>

        <div class="form-group">
          <label>Keywords</label>
          <div class="keywords-container" id="keywordsContainer"></div>
          <div class="add-keyword-row">
            <input
              type="text"
              id="inputKeyword"
              placeholder="Add a keyword…"
              disabled
            />
            <button id="addKeywordBtn" disabled>Add</button>
          </div>
        </div>

        <div class="form-group">
          <label for="inputDateTaken">Date Taken</label>
          <input type="datetime-local" id="inputDateTaken" disabled />
        </div>

        <div class="form-section">
          <h3>🌐 GPS Coordinates</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="inputLatitude">Latitude</label>
              <input
                type="number"
                id="inputLatitude"
                step="any"
                placeholder="e.g. 48.8566"
                disabled
              />
            </div>
            <div class="form-group">
              <label for="inputLongitude">Longitude</label>
              <input
                type="number"
                id="inputLongitude"
                step="any"
                placeholder="e.g. 2.3522"
                disabled
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="inputAltitude">Altitude (m)</label>
              <input
                type="number"
                id="inputAltitude"
                step="any"
                placeholder="e.g. 35.0"
                disabled
              />
            </div>
          </div>
        </div>

        <div class="save-bar">
          <button class="btn-reset" id="resetBtn" disabled>Reset</button>
          <button class="btn-save" id="saveBtn" disabled>Save Changes</button>
        </div>
      </div>

      <!-- Right: Image Preview + Map -->
      <div class="right-panel">
        <div class="image-preview" id="imagePreview">
          <div class="placeholder" id="placeholder">
            <strong>No image loaded</strong>
            Browse for images using the buttons above
          </div>
          <div class="nav-overlay" id="navOverlay" style="display: none">
            <button id="prevBtn" title="Previous image">◀</button>
            <button id="nextBtn" title="Next image">▶</button>
          </div>
          <span
            class="image-counter"
            id="imageCounter"
            style="display: none"
          ></span>
        </div>
        <div id="map"></div>
      </div>
    </div>

    <!-- ─── Toast ──────────────────────────────────────────────────────── -->
    <div class="toast" id="toast"></div>

    <!-- ─── JavaScript ─────────────────────────────────────────────────── -->
    <script>
      (function () {
        "use strict";

        // ── State ────────────────────────────────────────────────────
        const state = {
          images: [], // Array of {blobUrl, filename, originalMetadata, fileObj, fileHandle}
          currentIndex: -1, // Index into images[]
        };

        // ── DOM refs ─────────────────────────────────────────────────
        const $ = (sel) => document.querySelector(sel);
        const fileInput = $("#fileInput");
        const folderInput = $("#folderInput");
        const filePath = $("#filePath");
        const imgPreview = $("#imagePreview");
        const placeholder = $("#placeholder");
        const navOverlay = $("#navOverlay");
        const prevBtn = $("#prevBtn");
        const nextBtn = $("#nextBtn");
        const imageCounter = $("#imageCounter");

        const inputTitle = $("#inputTitle");
        const inputDescription = $("#inputDescription");
        const keywordsContainer = $("#keywordsContainer");
        const inputKeyword = $("#inputKeyword");
        const addKeywordBtn = $("#addKeywordBtn");
        const inputDateTaken = $("#inputDateTaken");
        const inputLatitude = $("#inputLatitude");
        const inputLongitude = $("#inputLongitude");
        const inputAltitude = $("#inputAltitude");
        const resetBtn = $("#resetBtn");
        const clearBtn = $("#clearBtn");
        const saveBtn = $("#saveBtn");

        const toastEl = $("#toast");

        // ── Leaflet map ──────────────────────────────────────────────
        let map = null;
        let marker = null;

        function initMap() {
          map = L.map("map").setView([20, 0], 2);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution:
              '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 19,
          }).addTo(map);

          map.on("click", function (e) {
            const { lat, lng } = e.latlng;
            inputLatitude.value = lat.toFixed(6);
            inputLongitude.value = lng.toFixed(6);

            if (marker) {
              marker.setLatLng([lat, lng]);
            } else {
              marker = L.marker([lat, lng], { draggable: true }).addTo(map);
              marker.on("dragend", function (ev) {
                const pos = ev.target.getLatLng();
                inputLatitude.value = pos.lat.toFixed(6);
                inputLongitude.value = pos.lng.toFixed(6);
                updateMarkerPopup(pos.lat, pos.lng, inputAltitude.value);
              });
            }
            updateMarkerPopup(lat, lng, inputAltitude.value);
          });
        }

        function updateMap(lat, lon, alt) {
          if (!map) return;
          if (lat == null || lon == null || lat === "" || lon === "") {
            map.setView([20, 0], 2);
            if (marker) {
              marker.remove();
              marker = null;
            }
            return;
          }
          const latNum = parseFloat(lat);
          const lonNum = parseFloat(lon);
          if (isNaN(latNum) || isNaN(lonNum)) return;
          map.setView([latNum, lonNum], 15);
          if (marker) {
            marker.setLatLng([latNum, lonNum]);
          } else {
            marker = L.marker([latNum, lonNum], { draggable: true }).addTo(map);
            marker.on("dragend", function (e) {
              const pos = e.target.getLatLng();
              inputLatitude.value = pos.lat.toFixed(6);
              inputLongitude.value = pos.lng.toFixed(6);
              updateMarkerPopup(pos.lat, pos.lng, inputAltitude.value);
            });
          }
          updateMarkerPopup(latNum, lonNum, alt);
        }

        function updateMarkerPopup(lat, lon, alt) {
          if (!marker) return;
          let text = `Lat: ${parseFloat(lat).toFixed(6)}<br>Lng: ${parseFloat(lon).toFixed(6)}`;
          if (alt != null && alt !== "" && !isNaN(parseFloat(alt))) {
            text += `<br>Alt: ${parseFloat(alt).toFixed(1)} m`;
          } else {
            text += `<br>Alt: —`;
          }
          marker.bindPopup(text).openPopup();
        }

        // ── Toast ────────────────────────────────────────────────────
        let toastTimer = null;

        function showToast(message, type) {
          type = type || "info";
          toastEl.textContent = message;
          toastEl.className = "toast " + type + " show";
          clearTimeout(toastTimer);
          toastTimer = setTimeout(() => {
            toastEl.classList.remove("show");
          }, 3000);
        }

        // ── Form helpers ─────────────────────────────────────────────
        function setFormEnabled(enabled) {
          const fields = [
            inputTitle,
            inputDescription,
            inputKeyword,
            inputDateTaken,
            inputLatitude,
            inputLongitude,
            addKeywordBtn,
            resetBtn,
            clearBtn,
            saveBtn,
          ];
          fields.forEach((el) => {
            el.disabled = !enabled;
          });
          renderKeywords();
        }

        function getFormMetadata() {
          const tags = keywordsContainer.querySelectorAll(".keyword-tag");
          const keywords = Array.from(tags).map(
            (el) => el.querySelector(".keyword-text").textContent,
          );
          const lat = inputLatitude.value
            ? parseFloat(inputLatitude.value)
            : null;
          const lon = inputLongitude.value
            ? parseFloat(inputLongitude.value)
            : null;
          const hasGps =
            lat !== null || lon !== null || inputAltitude.value !== "";
          return {
            title: inputTitle.value || null,
            description: inputDescription.value || null,
            keywords: keywords.length ? keywords : null,
            date_taken: inputDateTaken.value
              ? inputDateTaken.value + ":00"
              : null,
            gps: hasGps
              ? {
                  latitude_ref: lat !== null ? (lat >= 0 ? "N" : "S") : null,
                  latitude: lat,
                  longitude_ref: lon !== null ? (lon >= 0 ? "E" : "W") : null,
                  longitude: lon,
                  altitude: inputAltitude.value
                    ? parseFloat(inputAltitude.value)
                    : null,
                }
              : null,
          };
        }

        function setFormMetadata(meta) {
          inputTitle.value = meta.title || "";
          inputDescription.value = meta.description || "";
          renderKeywords(meta.keywords || []);
          inputKeyword.value = "";
          if (meta.date_taken) {
            const d = new Date(meta.date_taken);
            if (!isNaN(d.getTime())) {
              const pad = (n) => String(n).padStart(2, "0");
              inputDateTaken.value =
                d.getFullYear() +
                "-" +
                pad(d.getMonth() + 1) +
                "-" +
                pad(d.getDate()) +
                "T" +
                pad(d.getHours()) +
                ":" +
                pad(d.getMinutes());
            } else {
              inputDateTaken.value = "";
            }
          } else {
            inputDateTaken.value = "";
          }
          const gps = meta.gps || {};
          inputLatitude.value = gps.latitude != null ? gps.latitude : "";
          inputLongitude.value = gps.longitude != null ? gps.longitude : "";
          inputAltitude.value = gps.altitude != null ? gps.altitude : "";
          updateMap(
            inputLatitude.value,
            inputLongitude.value,
            inputAltitude.value,
          );
        }

        // ── Keywords ─────────────────────────────────────────────────
        function renderKeywords(keywords) {
          if (keywords !== undefined) {
            keywordsContainer.innerHTML = "";
            (keywords || []).forEach((kw) => addKeywordTag(kw));
            return;
          }
          const disabled = inputKeyword.disabled;
          keywordsContainer
            .querySelectorAll(".remove-keyword")
            .forEach((btn) => {
              btn.style.display = disabled ? "none" : "inline";
            });
        }

        function addKeywordTag(keyword) {
          const tag = document.createElement("span");
          tag.className = "keyword-tag";
          tag.innerHTML =
            `<span class="keyword-text">${escapeHtml(keyword)}</span>` +
            `<span class="remove-keyword" data-keyword="${escapeHtml(keyword)}">&times;</span>`;
          tag
            .querySelector(".remove-keyword")
            .addEventListener("click", () => tag.remove());
          keywordsContainer.appendChild(tag);
        }

        function escapeHtml(str) {
          const div = document.createElement("div");
          div.textContent = str;
          return div.innerHTML;
        }

        // ── Display the image + metadata at a given index ─────────
        function showImage(index) {
          const entry = state.images[index];
          if (!entry) return;

          // Update the nav + counter
          navOverlay.style.display = "flex";
          imageCounter.style.display = "block";
          imageCounter.textContent = `${index + 1} / ${state.images.length}`;
          prevBtn.disabled = index === 0;
          nextBtn.disabled = index === state.images.length - 1;

          // Show preview
          imgPreview.innerHTML = `<img src="${entry.blobUrl}" alt="${entry.filename}" />`;
          imgPreview.appendChild(navOverlay);
          imgPreview.appendChild(imageCounter);

          // Update file path display
          filePath.textContent = entry.filename;

          // Load metadata into form
          setFormMetadata(entry.originalMetadata);
          setFormEnabled(true);
        }

        // ── Load all selected files, fetch metadata for each ──────
        // Each item in fileList is either a {file, handle} object (from File System Access API)
        // or a bare File (when the API is unavailable and we fall back to <input>).
        async function loadFiles(fileList) {
          const items = Array.from(fileList);
          if (!items.length) return;

          // Revoke old blob URLs
          state.images.forEach((e) => URL.revokeObjectURL(e.blobUrl));

          const newImages = [];
          let loadError = null;

          for (let i = 0; i < items.length; i++) {
            const item = items[i];
            const fileObj = item.file || item; // unwrap {file, handle} or bare File
            const fileHandle = item.handle || null; // may be null if from <input> fallback
            const filename = fileObj.webkitRelativePath || fileObj.name;
            const blobUrl = URL.createObjectURL(fileObj);
            const formData = new FormData();
            formData.append("file", fileObj, filename);

            try {
              const res = await fetch("/api/metadata/upload", {
                method: "POST",
                body: formData,
              });
              if (!res.ok) throw new Error(res.statusText);
              const metadata = await res.json();
              newImages.push({
                blobUrl,
                filename,
                fileObj,
                fileHandle, // <-- now properly passed through
                originalMetadata: JSON.parse(JSON.stringify(metadata)),
              });
            } catch (err) {
              URL.revokeObjectURL(blobUrl);
              loadError = err.message;
              break;
            }
          }

          if (newImages.length === 0) {
            showToast(
              "Error loading images" + (loadError ? ": " + loadError : ""),
              "error",
            );
            return;
          }

          // Request write permission for all handles upfront (Chrome prompts once per handle)
          const handles = newImages.map((e) => e.fileHandle).filter(Boolean);
          if (handles.length) {
            const results = await Promise.allSettled(
              handles.map((h) => h.requestPermission({ mode: "readwrite" })),
            );
            results.forEach((r, i) => {
              if (r.status === "fulfilled" && r.value !== "granted") {
                newImages[i].fileHandle = null; // can't write to this one
              }
            });
          }

          state.images = newImages;
          state.currentIndex = 0;
          showImage(0);
          showToast(`Loaded ${newImages.length} image(s)`, "info");
          if (loadError)
            showToast("Some images failed to load: " + loadError, "error");
        }

        // ── Navigate ───────────────────────────────────────────────
        function goToImage(index) {
          if (index < 0 || index >= state.images.length) return;
          state.currentIndex = index;
          showImage(index);
        }

        // ── Save / Reset ─────────────────────────────────────────────
        async function saveMetadata() {
          const entry = state.images[state.currentIndex];
          if (!entry) {
            showToast("No file loaded", "error");
            return;
          }

          const metadata = getFormMetadata();

          const uploadApply = async (fileObj) => {
            const fd = new FormData();
            fd.append("file", fileObj, entry.filename);
            const q = `?metadata=${encodeURIComponent(JSON.stringify(metadata))}`;
            const res = await fetch(`/api/metadata/apply${q}`, {
              method: "POST",
              body: fd,
            });
            if (!res.ok) throw new Error(res.statusText);
            return res.blob();
          };

          try {
            let updated;

            // Write-back via File System Access handle (in-place)
            // Permission was already requested at load time.
            if (entry.fileHandle) {
              const fileObj = await entry.fileHandle.getFile();
              const blob = await uploadApply(fileObj);
              const writable = await entry.fileHandle.createWritable();
              await writable.write(blob);
              await writable.close();
              // Re-read from the handle after write
              const freshFile = await entry.fileHandle.getFile();
              const fd = new FormData();
              fd.append("file", freshFile, entry.filename);
              const conf = await fetch("/api/metadata/upload", {
                method: "POST",
                body: fd,
              });
              updated = await conf.json();
            } else {
              // No writable handle — in-place save isn't supported in this browser
              showToast(
                "In-place save not supported in this browser. Use Chrome or Edge.",
                "error",
              );
              return;
            }

            entry.originalMetadata = JSON.parse(JSON.stringify(updated));
            setFormMetadata(updated);
            showToast("Metadata saved successfully", "success");
          } catch (err) {
            showToast("Error saving: " + err.message, "error");
          }
        }

        function resetMetadata() {
          const entry = state.images[state.currentIndex];
          if (!entry) return;
          setFormMetadata(entry.originalMetadata);
          showToast("Reset to original values", "info");
        }

        function clearAll() {
          // Revoke all blob URLs to free memory
          state.images.forEach((e) => URL.revokeObjectURL(e.blobUrl));
          state.images = [];
          state.currentIndex = -1;

          // Reset UI
          filePath.textContent = "No file loaded";
          imgPreview.innerHTML = `<div class="placeholder" id="placeholder">
            <strong>No image loaded</strong>
            Browse for images using the buttons above
          </div>`;
          imgPreview.appendChild(navOverlay);
          imgPreview.appendChild(imageCounter);
          navOverlay.style.display = "none";
          imageCounter.style.display = "none";

          setFormEnabled(false);
          setFormMetadata({});
          updateMap(null, null, null);
          showToast("Cleared all images", "info");
        }

        // ── File picking using File System Access API (in-place read/write) ──
        async function pickFiles() {
          try {
            const handles = await window.showOpenFilePicker({
              multiple: true,
              types: [
                {
                  description: "Images",
                  accept: {
                    "image/*": [
                      ".jpg",
                      ".jpeg",
                      ".png",
                      ".tif",
                      ".tiff",
                      ".webp",
                      ".heic",
                      ".heif",
                    ],
                  },
                },
              ],
            });
            const items = await Promise.all(
              handles.map(async (handle) => ({
                file: await handle.getFile(),
                handle,
              })),
            );
            loadFiles(items);
          } catch (err) {
            if (err.name !== "AbortError")
              showToast("Could not access files: " + err.message, "error");
          }
        }

        async function pickFolder() {
          try {
            const dirHandle = await window.showDirectoryPicker();
            const items = [];
            for await (const [name, entry] of dirHandle.entries()) {
              if (entry.kind === "file") {
                const ext = name.toLowerCase().split(".").pop();
                if (
                  [
                    "jpg",
                    "jpeg",
                    "png",
                    "tif",
                    "tiff",
                    "webp",
                    "heic",
                    "heif",
                  ].includes(ext)
                ) {
                  items.push({ file: await entry.getFile(), handle: entry });
                }
              }
            }
            if (items.length) {
              loadFiles(items);
              return;
            }
            showToast("No supported images found in that folder", "error");
          } catch (err) {
            if (err.name !== "AbortError")
              showToast("Could not access folder: " + err.message, "error");
          }
        }

        // Wire the Browse/Folder labels to the async pickers
        const browseLabel = document.querySelector("label[for=fileInput]");
        const folderLabel = document.querySelector("label[for=folderInput]");

        if (window.showOpenFilePicker) {
          browseLabel?.addEventListener("click", function (e) {
            e.preventDefault();
            pickFiles();
          });
          fileInput.style.display = "none";
        } else {
          browseLabel?.addEventListener("click", function (e) {
            e.preventDefault();
            showToast(
              "Your browser doesn't support in-place editing. Please use Chrome or Edge.",
              "error",
            );
          });
        }

        if (window.showDirectoryPicker) {
          folderLabel?.addEventListener("click", function (e) {
            e.preventDefault();
            pickFolder();
          });
          folderInput.style.display = "none";
        } else {
          folderLabel?.addEventListener("click", function (e) {
            e.preventDefault();
            showToast(
              "Your browser doesn't support in-place editing. Please use Chrome or Edge.",
              "error",
            );
          });
        }

        prevBtn.addEventListener("click", () =>
          goToImage(state.currentIndex - 1),
        );
        nextBtn.addEventListener("click", () =>
          goToImage(state.currentIndex + 1),
        );

        addKeywordBtn.addEventListener("click", function () {
          const kw = inputKeyword.value.trim();
          if (kw) {
            const existing =
              keywordsContainer.querySelectorAll(".keyword-text");
            const exists = Array.from(existing).some(
              (el) => el.textContent.toLowerCase() === kw.toLowerCase(),
            );
            if (!exists) addKeywordTag(kw);
            inputKeyword.value = "";
          }
        });
        inputKeyword.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            addKeywordBtn.click();
          }
        });

        resetBtn.addEventListener("click", resetMetadata);
        clearBtn.addEventListener("click", clearAll);
        saveBtn.addEventListener("click", saveMetadata);

        // ── Sync map marker when GPS inputs change ───────────────────
        function onGpsInputChange() {
          const lat = inputLatitude.value;
          const lon = inputLongitude.value;
          if (lat && lon) {
            const latNum = parseFloat(lat);
            const lonNum = parseFloat(lon);
            if (!isNaN(latNum) && !isNaN(lonNum)) {
              if (marker) {
                marker.setLatLng([latNum, lonNum]);
              } else {
                marker = L.marker([latNum, lonNum], { draggable: true }).addTo(
                  map,
                );
                marker.on("dragend", function (ev) {
                  const pos = ev.target.getLatLng();
                  inputLatitude.value = pos.lat.toFixed(6);
                  inputLongitude.value = pos.lng.toFixed(6);
                  updateMarkerPopup(pos.lat, pos.lng, inputAltitude.value);
                });
              }
              map.setView([latNum, lonNum], Math.max(map.getZoom(), 10));
              updateMarkerPopup(latNum, lonNum, inputAltitude.value);
            }
          }
        }
        inputLatitude.addEventListener("input", onGpsInputChange);
        inputLongitude.addEventListener("input", onGpsInputChange);

        // ── Init ─────────────────────────────────────────────────────
        initMap();
      })();
    </script>
  </body>
</html>
